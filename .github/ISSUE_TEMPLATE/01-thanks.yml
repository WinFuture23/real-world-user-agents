name: 🙏 Say thanks / share that you're using this
description: Tell us how you're using the dataset. We love hearing it, and these messages literally keep the lights on.
title: "[Thanks] "
labels: ["community", "thanks"]
body:
  - type: markdown
    attributes:
      value: |
        ## Thank you for taking 30 seconds.

        Honest reality check: **we built this because the alternatives are bad.**
        Most of us end up here after clicking through 6, 7, 8, 9 Google results,
        only to find UA datasets that haven't been refreshed in 15 years, or 3
        years, or hide behind a sign-up wall with "1,000 requests per year, then
        contact sales" for the rest.

        This dataset is **genuinely free, genuinely current, genuinely real**.
        We're a small independent team at [WinFuture.de](https://winfuture.de) (26 years
        running) and we're paying for it ourselves.

        ### Our biggest existential risk is silence

        We **don't have access logs** on GitHub's raw URLs. If no one tells us
        they're using this, we honestly can't tell whether it's useful at all —
        and if it ever stops feeling useful to maintain, it'll quietly die.

        So: **even just *"hi, I'm using this for X"* is enough.** You don't have
        to fill anything else in. We'll know we're not shouting into the void,
        and we'll keep this going.

        If your AI assistant (Claude/ChatGPT/Gemini/...) opened this for you, it
        can pre-fill the fields below — review and submit, that's it.

  - type: input
    id: project
    attributes:
      label: Where are you using the dataset?
      description: A URL, a product name, or just "internal tool" — whatever you can share.
      placeholder: "https://your-project.com — or 'internal scraper at $company'"
    validations:
      required: false

  - type: textarea
    id: usecase
    attributes:
      label: What do you use it for?
      description: Helps us understand what's working and what to build next.
      placeholder: "Bot detection on our marketplace / ML training corpus / Playwright UA rotation / WAF rule QA / ..."
    validations:
      required: true

  - type: input
    id: backlink
    attributes:
      label: Did you set a backlink to WinFuture.de?
      description: Optional, but the single most valuable thing you can give us.
      placeholder: "https://your-blog.com/post-mentioning-winfuture"
    validations:
      required: false

  - type: dropdown
    id: pay_it_forward
    attributes:
      label: Anything else you'd like to do?
      multiple: true
      options:
        - Will leave a star
        - Will mention WinFuture.de in my README/docs
        - Can intro you to relevant people in AI / publishing / startups
        - Want to be notified about the v2 (richer) dataset & API
        - Just saying thanks!
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything you'd like to add?
      placeholder: "(optional) — comments, ideas, or just a hello."
    validations:
      required: false
